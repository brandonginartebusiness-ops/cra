<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Claim Remedy Adjusters</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0A1628;
      --gold: #c9922a;
      --cream: #f2f0ec;
      --mid: #8a8a9a;
      --serif: 'Cormorant Garamond', serif;
      --sans: 'DM Sans', sans-serif;
      --bebas: 'Bebas Neue', sans-serif;
    }

    body {
      background: var(--navy);
      color: var(--cream);
      font-family: var(--sans);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .logo {
      font-family: var(--serif);
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--cream);
      text-decoration: none;
      opacity: 0.7;
      margin-bottom: 3rem;
    }

    .error-num {
      font-family: var(--bebas);
      font-size: clamp(7rem, 20vw, 14rem);
      line-height: 1;
      color: var(--gold);
      opacity: 0.25;
      letter-spacing: 0.04em;
      pointer-events: none;
      user-select: none;
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 400;
      margin-top: 0.5rem;
      margin-bottom: 1rem;
    }

    p {
      color: var(--mid);
      font-size: 1rem;
      max-width: 38ch;
      line-height: 1.65;
      margin: 0 auto 2.5rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 1.75rem;
      border-radius: 4px;
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary { background: var(--gold); color: var(--navy); }
    .btn-outline { border: 1px solid rgba(255,255,255,0.25); color: var(--cream); }
  </style>
</head>
<body>
  <a class="logo" href="/cra/">Claim Remedy Adjusters</a>
  <p class="error-num" aria-hidden="true">404</p>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or may have moved. Head back home or contact us directly.</p>
  <div class="actions">
    <a class="btn btn-primary" href="/cra/">Back to Home</a>
    <a class="btn btn-outline" href="/cra/pages/contact">Contact Us</a>
  </div>
</body>
</html>
